<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicios: Los Colores</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; max-width: 600px; margin: 40px auto; padding: 20px; color: #333; }
        h2 { color: #008080; } /* Turquesa */
        .ejercicio { background: #fff5eb; padding: 20px; border-radius: 8px; border-left: 5px solid #ff8c00; margin-bottom: 20px; } /* Naranja */
        input { border: 1px solid #ccc; padding: 5px; border-radius: 4px; }
        button { background-color: #008080; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>1. Clasificación por reglas</h2>
    <div class="ejercicio">
        <table border="1" style="width:100%; border-collapse: collapse; text-align: center;">
            <tr><th>Color</th><th>Femenino</th><th>Plural</th></tr>
            <tr><td>Rojo</td><td><input type="text"></td><td><input type="text"></td></tr>
            <tr><td>Amarillo</td><td><input type="text"></td><td><input type="text"></td></tr>
            <tr><td>Negro</td><td><input type="text"></td><td><input type="text"></td></tr>
            <tr><td>Verde</td><td><input type="text"></td><td><input type="text"></td></tr>
            <tr><td>Azul</td><td><input type="text"></td><td><input type="text"></td></tr>
        </table>
    </div>

    <h2>2. Concordancia</h2>
    <div class="ejercicio">
        <p>La mesa es <input type="text"> (rojo)</p>
        <p>Los coches son <input type="text"> (verde)</p>
        <p>La camisa es <input type="text"> (amarillo)</p>
        <p>Las flores son <input type="text"> (azul)</p>
        <p>El libro es <input type="text"> (negro)</p>
        <p>Las ventanas son <input type="text"> (blanco)</p>
    </div>

    <button onclick="alert('¡Buen trabajo! Sigue practicando.')">Finalizar</button>

</body>
</html>
